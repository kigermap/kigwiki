<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1030" viewBox="0 0 1600 1030">
<style>text{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;}</style>
<rect width="100%" height="100%" fill="#f8fafc"/>
<rect x="50" y="45" width="1500" height="940" rx="36" fill="#ffffff" stroke="#e5e7eb"/>
<text x="100" y="112" font-size="42" font-weight="800" fill="#111827" text-anchor="start" opacity="1">2025 年風險与治理矩陣</text>
<text x="100" y="153" font-size="24" font-weight="400" fill="#64748b" text-anchor="start" opacity="1">负面事件不只等于丑闻；很多关键变化是風險被写进規則。</text>
<line x1="250" y1="850" x2="1370" y2="850" stroke="#334155" stroke-width="3"/>
<line x1="250" y1="850" x2="250" y2="235" stroke="#334155" stroke-width="3"/>
<text x="810" y="915" font-size="24" font-weight="700" fill="#334155" text-anchor="middle" opacity="1">制度化程度：临时应对 → 明确規則</text>
<text x="120" y="540" font-size="24" font-weight="700" fill="#334155" text-anchor="middle" opacity="1">風險强度</text>
<text x="120" y="540" transform="rotate(-90 120 540)" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">風險强度：低 → 高</text>
<rect x="250" y="235" width="560" height="307" fill="#64748b" opacity="0.07"/>
<text x="278" y="283" font-size="28" font-weight="850" fill="#64748b" text-anchor="start" opacity="1">待观察</text>
<text x="278" y="327.0" font-size="23" font-weight="500" fill="#374151">小范围口碑、跨圈误解、术语混用</text>
<rect x="810" y="235" width="560" height="307" fill="#dc2626" opacity="0.07"/>
<text x="838" y="283" font-size="28" font-weight="850" fill="#dc2626" text-anchor="start" opacity="1">重点治理</text>
<text x="838" y="327.0" font-size="23" font-weight="500" fill="#374151">中暑、池边/水域、移动视野、攝影同意</text>
<rect x="250" y="542" width="560" height="308" fill="#0ea5e9" opacity="0.07"/>
<text x="278" y="590" font-size="28" font-weight="850" fill="#0ea5e9" text-anchor="start" opacity="1">日常维护</text>
<text x="278" y="634.0" font-size="23" font-weight="500" fill="#374151">更衣、动线、社交礼仪、活动后沟通</text>
<rect x="810" y="542" width="560" height="308" fill="#059669" opacity="0.07"/>
<text x="838" y="590" font-size="28" font-weight="850" fill="#059669" text-anchor="start" opacity="1">成熟化信号</text>
<text x="838" y="634.0" font-size="23" font-weight="500" fill="#374151">WCS 遮面規則、Lagucos 禁入水、后交流会沟通要求</text>
<rect x="335" y="346" width="190" height="48" rx="24" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
<text x="430" y="378" font-size="20" font-weight="800" fill="#64748b" text-anchor="middle" opacity="1">匿名傳聞线程</text>
<rect x="435" y="431" width="190" height="48" rx="24" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
<text x="530" y="463" font-size="20" font-weight="800" fill="#64748b" text-anchor="middle" opacity="1">網絡骚扰/误读</text>
<rect x="975" y="326" width="190" height="48" rx="24" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
<text x="1070" y="358" font-size="20" font-weight="800" fill="#dc2626" text-anchor="middle" opacity="1">高溫脫水</text>
<rect x="1055" y="406" width="190" height="48" rx="24" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
<text x="1150" y="438" font-size="20" font-weight="800" fill="#dc2626" text-anchor="middle" opacity="1">水域安全</text>
<rect x="425" y="666" width="190" height="48" rx="24" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
<text x="520" y="698" font-size="20" font-weight="800" fill="#0ea5e9" text-anchor="middle" opacity="1">更衣/攝影动线</text>
<rect x="955" y="626" width="190" height="48" rx="24" fill="#ffffff" stroke="#059669" stroke-width="2"/>
<text x="1050" y="658" font-size="20" font-weight="800" fill="#059669" text-anchor="middle" opacity="1">WCS 遮面许可</text>
<rect x="1065" y="706" width="190" height="48" rx="24" fill="#ffffff" stroke="#059669" stroke-width="2"/>
<text x="1160" y="738" font-size="20" font-weight="800" fill="#059669" text-anchor="middle" opacity="1">Lagucos 入水限制</text>
<rect x="935" y="781" width="190" height="48" rx="24" fill="#ffffff" stroke="#059669" stroke-width="2"/>
<text x="1030" y="813" font-size="20" font-weight="800" fill="#059669" text-anchor="middle" opacity="1">交流会需可沟通</text>
<rect x="875" y="466" width="190" height="48" rx="24" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
<text x="970" y="498" font-size="20" font-weight="800" fill="#ca8a04" text-anchor="middle" opacity="1">跨境關稅/物流</text>
<text x="100" y="955" font-size="22" font-weight="700" fill="#475569" text-anchor="start" opacity="1">閱讀建議：把“安全規則”视为社群成熟的证据，而非单纯限制。</text>
</svg>