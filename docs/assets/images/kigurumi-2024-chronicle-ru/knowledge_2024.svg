<circle cx="1055" cy="135" r="35" fill="#FFB86B" opacity="0.18"/>
<text x="58" y="78" font-size="32" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Производство знаний в конце 2024</text>
<text x="60" y="116" font-size="14" font-weight="400" fill="#4B5563" font-family="Inter, Arial, sans-serif">В декабре были не только события, но и тексты, опросы и doujin-архивация.</text>
<rect x="60" y="134" width="500" height="142" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="60" y="134" width="10" height="142" rx="5" fill="#0EA5E9"/>
<text x="88" y="170" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Advent Calendar</text>
<text x="88" y="204" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">25/25 регистраций</text>
<text x="88" y="231" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">платформы: note/X/Misskey</text>
<text x="88" y="258" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">темы: фото, создание, управление, офлайн</text>
<rect x="610" y="134" width="500" height="142" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="610" y="134" width="10" height="142" rx="5" fill="#0EA5E9"/>
<text x="638" y="170" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">160 ответов</text>
<text x="638" y="204" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">«почему носить着ぐるみ»</text>
<text x="638" y="231" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">предпочитаемый формат событий</text>
<text x="638" y="258" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">споры о публикации IP-персонажей</text>
<rect x="60" y="324" width="500" height="142" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="60" y="324" width="10" height="142" rx="5" fill="#0EA5E9"/>
<text x="88" y="360" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Отчеты kig_Doll</text>
<text x="88" y="394" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">участники пишут о месте, правилах и опыте</text>
<text x="88" y="421" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">обувь, обзор, attendant и практика</text>
<text x="88" y="448" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">опыт превращается в учебный материал</text>
<rect x="610" y="324" width="500" height="142" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="610" y="324" width="10" height="142" rx="5" fill="#0EA5E9"/>
<text x="638" y="360" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">C105 фотокнига</text>
<text x="638" y="394" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">план着ぐるみ фотокниги</text>
<text x="638" y="421" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">A5, 32 страницы, цвет</text>
<text x="638" y="448" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">kigurumi входит в doujin-издание</text>
<rect x="60" y="514" width="500" height="142" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="60" y="514" width="10" height="142" rx="5" fill="#0EA5E9"/>
<text x="88" y="550" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Значение</text>
<text x="88" y="584" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">от «куда я ходил»</text>
<text x="88" y="611" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">к «как понять и улучшить»</text>
<text x="88" y="638" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">память сообщества оседает</text>
<rect x="610" y="514" width="500" height="142" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="610" y="514" width="10" height="142" rx="5" fill="#0EA5E9"/>
<text x="638" y="550" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Ограничения</text>
<text x="638" y="584" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">в основном личные тексты</text>
<text x="638" y="611" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">не представляет всё сообщество</text>
<text x="638" y="638" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">но показывает проблемное мышление</text>
</svg>