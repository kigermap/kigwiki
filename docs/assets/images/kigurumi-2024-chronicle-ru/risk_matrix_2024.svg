<text x="88" y="593" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">длинные/крупные props ограничиваются</text>
<text x="88" y="618" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">нужны сопровождающие и помощь обзора</text>
<rect x="610" y="496" width="500" height="156" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="610" y="496" width="10" height="156" rx="5" fill="#EF4444"/>
<text x="638" y="534" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Отмена, транспорт, правила</text>
<text x="638" y="568" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">отмена Special studio</text>
<text x="638" y="593" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">тайфун отменил поезда/рейсы</text>
<text x="638" y="618" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">ban notice и трение правил</text>
