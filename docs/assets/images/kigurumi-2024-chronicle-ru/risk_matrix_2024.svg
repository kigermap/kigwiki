<text x="88" y="178" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Жара и выносливость</text>
<text x="88" y="212" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">WCS: первый booth Heatstroke Zero</text>
<text x="88" y="237" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">C104: Токио 35℃+ два дня</text>
<text x="88" y="262" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">полная маска и suit плохо отводят тепло</text>
