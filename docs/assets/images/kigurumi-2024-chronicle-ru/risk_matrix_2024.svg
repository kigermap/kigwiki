<text x="60" y="116" font-size="14" font-weight="400" fill="#4B5563" font-family="Inter, Arial, sans-serif">Негатив и ограничения 2024 записаны как задачи управления событиями, а не как сплетни.</text>
<rect x="60" y="140" width="500" height="156" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
