<text x="638" y="178" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Ночь и бессонница</text>
<text x="638" y="212" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">Night2nd 21:30—7:30</text>
<text x="638" y="237" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">недосып и падение внимания</text>
<text x="638" y="262" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">нужны план возвращения, отдых, вода</text>
<rect x="60" y="318" width="500" height="156" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="60" y="318" width="10" height="156" rx="5" fill="#EF4444"/>
<text x="88" y="356" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Согласие на съемку</text>
<text x="88" y="390" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">着ぐFesta явно запрещает side-shooting</text>
<text x="88" y="415" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">съемка без согласия считается скрытой</text>
<text x="88" y="440" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">публикация уважает модель</text>
<rect x="610" y="318" width="500" height="156" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="610" y="318" width="10" height="156" rx="5" fill="#EF4444"/>
<text x="638" y="356" font-size="21" font-weight="700" fill="#111827" font-family="Inter, Arial, sans-serif">Границы прикосновений</text>
<text x="638" y="390" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">着ぐFesta явно запрещает объятия</text>
<text x="638" y="415" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">в маске трудно отказать</text>
<text x="638" y="440" font-size="15" font-weight="400" fill="#374151" font-family="Inter, Arial, sans-serif">правила важнее «своей атмосферы»</text>
<rect x="60" y="496" width="500" height="156" rx="20" fill="#FFFFFF" stroke="#E5E7EB"/>
<rect x="60" y="496" width="10" height="156" rx="5" fill="#EF4444"/>
