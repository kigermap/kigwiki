<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">AIGC 意見領袖的 SOR 生成機理</title>
  <desc id="desc">圖示展示刺激、有機體、反應三個層面如何共同形成 AIGC 意見領袖的生成機理。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfa"/>
      <stop offset="1" stop-color="#eef3ef"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#247c78"/>
    </marker>
    <style>
      .bg { fill: url(#paper); }
      .frame { fill: none; stroke: #d8e1db; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #d8e1db; stroke-width: 2; }
      .box-a { fill: #f7fbfa; stroke: #247c78; }
      .box-b { fill: #fff8fa; stroke: #a65372; }
      .box-c { fill: #fffaf0; stroke: #92733e; }
      .title { font: 700 26px "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #172235; }
      .head { font: 700 22px "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #172235; }
      .label { font: 500 17px "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #314154; }
      .small { font: 500 15px "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #647185; }
      .arrow { stroke: #247c78; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="1" y="1" width="978" height="428" rx="8"/>
  <rect class="frame" x="18" y="18" width="944" height="394" rx="8"/>
  <text class="title" x="490" y="54" text-anchor="middle">AIGC 意見領袖的 SOR 生成機理</text>

  <rect class="box box-a" x="54" y="100" width="250" height="218" rx="8"/>
  <text class="head" x="179" y="134" text-anchor="middle">刺激 S</text>
  <text class="small" x="179" y="158" text-anchor="middle">技術環境 + 社交回饋</text>
  <text class="label" x="84" y="194">資訊爆炸與篩選需求</text>
  <text class="label" x="84" y="225">多模態工具降低門檻</text>
  <text class="label" x="84" y="256">推薦演算法放大傳播</text>
  <text class="label" x="84" y="287">認知代償與專業依賴</text>

  <rect class="box box-b" x="365" y="100" width="250" height="218" rx="8"/>
  <text class="head" x="490" y="134" text-anchor="middle">有機體 O</text>
  <text class="small" x="490" y="158" text-anchor="middle">主體成長與情感體驗</text>
  <text class="label" x="395" y="194">知識網絡儲備</text>
  <text class="label" x="395" y="225">技術理解與處理能力</text>
  <text class="label" x="395" y="256">自我效能與成就動機</text>
  <text class="label" x="395" y="287">事實核查與風險感知</text>

  <rect class="box box-c" x="676" y="100" width="250" height="218" rx="8"/>
  <text class="head" x="801" y="134" text-anchor="middle">反應 R</text>
  <text class="small" x="801" y="158" text-anchor="middle">行為輸出 + 互動</text>
  <text class="label" x="706" y="194">內容生產提速</text>
  <text class="label" x="706" y="225">生成 - 修正 - 驗證</text>
  <text class="label" x="706" y="256">平台矩陣與社群營運</text>
  <text class="label" x="706" y="287">影響力迭代</text>

  <path class="arrow" d="M314 209 H350"/>
  <path class="arrow" d="M625 209 H661"/>
  <path class="arrow" d="M802 323 C802 374 178 374 178 323"/>
  <text class="small" x="490" y="384" text-anchor="middle">互動慣習、認同回饋與技術學習繼續反向強化生成過程</text>
</svg>
