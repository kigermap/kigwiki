<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-labelledby="title desc">
  <title id="title">AIGC 意見領袖的正向增強回路</title>
  <desc id="desc">圖示展示技術認知、內容生產、信任積累、社會資本與影響力之間的正向循環。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfa"/>
      <stop offset="1" stop-color="#eef3ef"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#a65372"/>
    </marker>
    <style>
      .bg { fill: url(#paper); }
      .frame { fill: none; stroke: #d8e1db; stroke-width: 2; }
      .node { fill: #ffffff; stroke: #d8e1db; stroke-width: 2; }
      .node-a { fill: #f7fbfa; stroke: #247c78; }
      .node-b { fill: #fff8fa; stroke: #a65372; }
      .node-c { fill: #fffaf0; stroke: #92733e; }
      .node-d { fill: #f6f8ff; stroke: #123a5a; }
      .node-e { fill: #f8fff9; stroke: #4f7b61; }
      .title { font: 700 26px "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #172235; }
      .head { font: 700 20px "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #172235; }
      .label { font: 500 16px "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #314154; }
      .small { font: 500 15px "Noto Sans CJK TC", "PingFang TC", sans-serif; fill: #647185; }
      .arrow { stroke: #a65372; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="1" y="1" width="978" height="458" rx="8"/>
  <rect class="frame" x="18" y="18" width="944" height="424" rx="8"/>
  <text class="title" x="490" y="54" text-anchor="middle">AIGC 意見領袖的正向增強回路</text>

  <rect class="node node-a" x="384" y="88" width="212" height="88" rx="8"/>
  <text class="head" x="490" y="124" text-anchor="middle">技術認知</text>
  <text class="small" x="490" y="150" text-anchor="middle">工具理解、模型迭代、知識儲備</text>

  <rect class="node node-b" x="666" y="176" width="218" height="92" rx="8"/>
  <text class="head" x="775" y="212" text-anchor="middle">內容生產</text>
  <text class="small" x="775" y="238" text-anchor="middle">生成、修正、驗證、多模態呈現</text>

  <rect class="node node-c" x="548" y="322" width="224" height="88" rx="8"/>
  <text class="head" x="660" y="358" text-anchor="middle">信任積累</text>
  <text class="small" x="660" y="384" text-anchor="middle">受眾追隨、認同與互動慣習</text>

  <rect class="node node-d" x="208" y="322" width="224" height="88" rx="8"/>
  <text class="head" x="320" y="358" text-anchor="middle">社會資本</text>
  <text class="small" x="320" y="384" text-anchor="middle">社交網絡、資源交換、話語權</text>

  <rect class="node node-e" x="96" y="176" width="218" height="92" rx="8"/>
  <text class="head" x="205" y="212" text-anchor="middle">影響力擴大</text>
  <text class="small" x="205" y="238" text-anchor="middle">曝光、商業轉化與角色升級</text>

  <path class="arrow" d="M596 132 C642 135 682 151 720 176"/>
  <path class="arrow" d="M779 268 C766 303 734 323 706 335"/>
  <path class="arrow" d="M548 366 H444"/>
  <path class="arrow" d="M258 322 C231 304 212 286 205 269"/>
  <path class="arrow" d="M205 176 C237 130 304 114 384 119"/>

  <text class="small" x="490" y="222" text-anchor="middle">資本轉化路徑</text>
  <text class="label" x="490" y="250" text-anchor="middle">文化資本 → 社會資本 → 經濟資本</text>
  <text class="small" x="490" y="278" text-anchor="middle">收入與資源再投入設備、團隊、行銷，繼續強化循環</text>
</svg>
