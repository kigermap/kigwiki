<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">AIGC 意见领袖的 SOR 生成机理</title>
  <desc id="desc">图示展示刺激、有机体、反应三个层面如何共同形成 AIGC 意见领袖的生成机理。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfa"/>
      <stop offset="1" stop-color="#eef3ef"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#247c78"/>
    </marker>
    <style>
      .bg { fill: url(#paper); }
      .frame { fill: none; stroke: #d8e1db; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #d8e1db; stroke-width: 2; }
      .box-a { fill: #f7fbfa; stroke: #247c78; }
      .box-b { fill: #fff8fa; stroke: #a65372; }
      .box-c { fill: #fffaf0; stroke: #92733e; }
      .title { font: 700 26px "Noto Sans CJK SC", "PingFang SC", sans-serif; fill: #172235; }
      .head { font: 700 22px "Noto Sans CJK SC", "PingFang SC", sans-serif; fill: #172235; }
      .label { font: 500 17px "Noto Sans CJK SC", "PingFang SC", sans-serif; fill: #314154; }
      .small { font: 500 15px "Noto Sans CJK SC", "PingFang SC", sans-serif; fill: #647185; }
      .arrow { stroke: #247c78; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="1" y="1" width="978" height="428" rx="8"/>
  <rect class="frame" x="18" y="18" width="944" height="394" rx="8"/>
  <text class="title" x="490" y="54" text-anchor="middle">AIGC 意见领袖的 SOR 生成机理</text>

  <rect class="box box-a" x="54" y="100" width="250" height="218" rx="8"/>
  <text class="head" x="179" y="134" text-anchor="middle">刺激 S</text>
  <text class="small" x="179" y="158" text-anchor="middle">技术环境 + 社交反馈</text>
  <text class="label" x="84" y="194">信息爆炸与筛选需求</text>
  <text class="label" x="84" y="225">多模态工具降低门槛</text>
  <text class="label" x="84" y="256">推荐算法放大传播</text>
  <text class="label" x="84" y="287">认知代偿与专业依赖</text>

  <rect class="box box-b" x="365" y="100" width="250" height="218" rx="8"/>
  <text class="head" x="490" y="134" text-anchor="middle">有机体 O</text>
  <text class="small" x="490" y="158" text-anchor="middle">主体成长与情感体验</text>
  <text class="label" x="395" y="194">知识网络储备</text>
  <text class="label" x="395" y="225">技术理解与处理能力</text>
  <text class="label" x="395" y="256">自我效能与成就动机</text>
  <text class="label" x="395" y="287">事实核查与风险感知</text>

  <rect class="box box-c" x="676" y="100" width="250" height="218" rx="8"/>
  <text class="head" x="801" y="134" text-anchor="middle">反应 R</text>
  <text class="small" x="801" y="158" text-anchor="middle">行为输出 + 互动</text>
  <text class="label" x="706" y="194">内容生产提速</text>
  <text class="label" x="706" y="225">生成 - 修正 - 验证</text>
  <text class="label" x="706" y="256">平台矩阵与社群运营</text>
  <text class="label" x="706" y="287">影响力迭代</text>

  <path class="arrow" d="M314 209 H350"/>
  <path class="arrow" d="M625 209 H661"/>
  <path class="arrow" d="M802 323 C802 374 178 374 178 323"/>
  <text class="small" x="490" y="384" text-anchor="middle">互动惯习、认同反馈与技术学习继续反向强化生成过程</text>
</svg>
