<text x="614" y="637.0" font-size="19" font-weight="450" fill="#374151">5 月 Doll Weekend × First Klass 日本企划显示трансгр.延伸</text>
<rect x="100" y="705" width="1400" height="92" rx="28" fill="#fff7ed" stroke="#fdba74"/>
<text x="130" y="742.0" font-size="24" font-weight="700" fill="#7c2d12">编年史意义：DW12 不只是“人数多”，而是把 kigurumi / doller 从私域摄影与同好会推进到大型会场、城市合作、индустр.展和公共景观的复合形态。</text>
