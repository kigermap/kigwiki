<text x="310" y="430" font-size="24" font-weight="700" fill="#9a3412" text-anchor="middle" opacity="1">публично указанные участники</text>
<rect x="590" y="275" width="390" height="112" rx="24" fill="#ffffff" stroke="#f97316" stroke-width="2.5"/>
