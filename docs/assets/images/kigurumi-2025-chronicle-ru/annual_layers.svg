<text x="250.0" y="363" font-size="42" font-weight="900" fill="#db2777" text-anchor="middle" opacity="1">1</text>
<text x="250.0" y="435" font-size="30" font-weight="850" fill="#db2777" text-anchor="middle" opacity="1">Масштаб</text>
<text x="160" y="490.0" font-size="22" font-weight="500" fill="#374151">DW12 千人级、офиц. IP 大型展</text>
<text x="160" y="519.7" font-size="22" font-weight="500" fill="#374151">会、暑期节点密集</text>
<rect x="420" y="275" width="230" height="360" rx="34" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
<circle cx="535.0" cy="353" r="46" fill="#7c3aed" opacity="0.15"/>
