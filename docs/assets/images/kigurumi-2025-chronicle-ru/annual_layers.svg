<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820">
<style>text{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans CJK SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;}</style>
<rect width="100%" height="100%" fill="#f8fafc"/>
<rect x="50" y="45" width="1500" height="730" rx="36" fill="#ffffff" stroke="#e5e7eb"/>
<text x="100" y="120" font-size="42" font-weight="850" fill="#111827" text-anchor="start" opacity="1">Пять линий 2025 года</text>
<text x="100" y="160" font-size="24" font-weight="400" fill="#64748b" text-anchor="start" opacity="1">Масштаб、Институты、Технологии、Трансграничность、Споры同时发生。</text>
<rect x="135" y="275" width="230" height="360" rx="34" fill="#ffffff" stroke="#db2777" stroke-width="3"/>
