<text x="535.0" y="435" font-size="30" font-weight="850" fill="#7c3aed" text-anchor="middle" opacity="1">Институты</text>
<text x="445" y="490.0" font-size="22" font-weight="500" fill="#374151">专门活动、WCS 遮面правила、Lag</text>
<text x="445" y="519.7" font-size="22" font-weight="500" fill="#374151">ucos 安全边界</text>
<rect x="705" y="275" width="230" height="360" rx="34" fill="#ffffff" stroke="#059669" stroke-width="3"/>
<circle cx="820.0" cy="353" r="46" fill="#059669" opacity="0.15"/>
<text x="820.0" y="363" font-size="42" font-weight="900" fill="#059669" text-anchor="middle" opacity="1">3</text>
<text x="820.0" y="435" font-size="30" font-weight="850" fill="#059669" text-anchor="middle" opacity="1">Технологии</text>
<text x="730" y="490.0" font-size="22" font-weight="500" fill="#374151">Anime North мастерская масок、新</text>
<text x="730" y="519.7" font-size="22" font-weight="500" fill="#374151">人入门与 makers 体系</text>
<rect x="990" y="275" width="230" height="360" rx="34" fill="#ffffff" stroke="#f97316" stroke-width="3"/>
<circle cx="1105.0" cy="353" r="46" fill="#f97316" opacity="0.15"/>
<text x="1105.0" y="363" font-size="42" font-weight="900" fill="#f97316" text-anchor="middle" opacity="1">4</text>
<text x="1105.0" y="435" font-size="30" font-weight="850" fill="#f97316" text-anchor="middle" opacity="1">Трансграничность</text>
<text x="1015" y="490.0" font-size="22" font-weight="500" fill="#374151">中日合作、北美工作坊、欧洲延</text>
<text x="1015" y="519.7" font-size="22" font-weight="500" fill="#374151">续线、全球офиц. IP</text>
<rect x="1275" y="275" width="230" height="360" rx="34" fill="#ffffff" stroke="#64748b" stroke-width="3"/>
<circle cx="1390.0" cy="353" r="46" fill="#64748b" opacity="0.15"/>
<text x="1390.0" y="363" font-size="42" font-weight="900" fill="#64748b" text-anchor="middle" opacity="1">5</text>
<text x="1390.0" y="435" font-size="30" font-weight="850" fill="#64748b" text-anchor="middle" opacity="1">Споры</text>
