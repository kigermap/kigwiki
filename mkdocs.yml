site_name: Kigurumi 编年志
site_url: https://kigwiki.com/
site_description: 面向 kigurumi 社群的编年史、修志与资料馆。
site_author: Kigurumi Chronicle Archive
copyright: Copyright &copy; 2026 Kigurumi Chronicle Archive. Content is provided for archival and educational reference; please preserve attribution and source context when citing.

theme:
  name: material
  language: zh
  logo: assets/images/sample-archive.svg
  favicon: assets/images/sample-archive.svg
  features:
    - announce.dismiss
    - content.code.copy
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh-Hans
          name: 简体中文
          default: true
          build: true
          link: /
          site_name: Kigurumi 编年志
          site_description: 面向 kigurumi 社群的编年史、修志与资料馆。
          copyright: Copyright &copy; 2026 Kigurumi 编年志资料馆。本站内容用于资料整理、研究与教育参考；引用时请保留署名、出处与语境。
          theme:
            language: zh
            palette:
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: custom
                accent: custom
                toggle:
                  icon: material/weather-night
                  name: 切换到深色模式
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: custom
                accent: custom
                toggle:
                  icon: material/weather-sunny
                  name: 切换到浅色模式
          extra:
            social:
              - icon: material/home
                link: /
                name: 首页
              - icon: material/account-plus
                link: /join/
                name: 参与加入
              - icon: material/timeline-clock
                link: /chronicle/
                name: 编年目录
              - icon: material/map-marker-radius
                link: /places/
                name: 地点目录
              - icon: material/information
                link: /about/
                name: 关于介绍
              - icon: material/format-quote-close
                link: /citation/
                name: 引用规范
              - icon: material/frequently-asked-questions
                link: /faq/
                name: 常见问题
              - icon: material/license
                link: /license/
                name: 开源协议
          nav:
            - 首页: index.md
            - 关于介绍: about/index.md
            - 参与加入: join/index.md
            - 贡献与支持: support/index.md
