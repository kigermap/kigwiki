hooks:
  - scripts/site_hooks.py

extra_css:
  - assets/stylesheets/extra.css?v=20260613-join-qq-card

extra_javascript:
  - assets/javascripts/archive-ui.js?v=20260613-mobile-nav

extra:
  generator: false
  social:
    - icon: material/home
      link: /
      name: 首页
    - icon: material/account-plus
      link: /join/
      name: 参与加入
    - icon: material/timeline-clock
      link: /chronicle/
      name: 编年目录
    - icon: material/map-marker-radius
      link: /places/
      name: 地点目录
    - icon: material/information
      link: /about/
      name: 关于介绍
    - icon: material/format-quote-close
      link: /citation/
      name: 引用规范
    - icon: material/frequently-asked-questions
      link: /faq/
      name: 常见问题
    - icon: material/license
      link: /license/
      name: 开源协议

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - 首页: index.md
  - 关于介绍: about/index.md
  - 参与加入: join/index.md
  - 贡献与支持: support/index.md
  - 编年:
      - 编年总览: chronicle/index.md
      - 年份目录: years/index.md
  - 志目:
      - 地点目录: places/index.md
      - 人物目录: people/index.md
      - 来源目录: sources/index.md
  - 引用规范: citation/index.md
  - 常见问题: faq/index.md
  - 开源协议: license/index.md
